<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puni Puni Style Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #fce4ec;
            --panel-color: #ffffff;
            --accent-color: #ff4081;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: none; /* 防止縮放 */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 80vh;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
            border-radius: 20px 20px 0 0;
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .label { font-size: 12px; color: #888; display: block; }
        .value { font-size: 20px; font-weight: bold; color: var(--accent-color); }

        #controls {
            width: 100%;
            max-width: 400px;
            height: 15vh;
            background: var(--panel-color);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            border-radius: 0 0 20px 20px;
        }

        .hint {
            color: #888;
            font-size: 14px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-item">
            <span class="label">SCORE</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="stat-item">
            <span class="label">TIME</span>
            <span id="time" class="value">60</span>
        </div>
    </div>

    <div id="game-container"></div>

    <div id="controls">
        <div class="hint">同じキャラを3つ以上なぞって繋げよう！</div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, MouseConstraint, Mouse, Vector, Body } = Matter;

        // 設定
        const WIDTH = 400;
        const HEIGHT = window.innerHeight * 0.8;
        const PUNI_RADIUS = 25;
        const TYPES = [
            { color: '#FF5252', emoji: '🍎', id: 0 },
            { color: '#FFEB3B', emoji: '🍋', id: 1 },
            { color: '#4CAF50', emoji: '🍏', id: 2 },
            { color: '#9C27B0', emoji: '🍇', id: 3 },
            { color: '#FF9800', emoji: '🍊', id: 4 }
        ];

        // 状態
        let engine, render, runner;
        let punis = [];
        let selectedPunis = [];
        let score = 0;
        let timeLeft = 60;
        let isDragging = false;

        function init() {
            // エンジン
            engine = Engine.create();
            
            // レンダラー
            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: WIDTH,
                    height: HEIGHT,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // 壁
            const ground = Bodies.rectangle(WIDTH/2, HEIGHT + 50, WIDTH, 100, { isStatic: true });
            const leftWall = Bodies.rectangle(-50, HEIGHT/2, 100, HEIGHT, { isStatic: true });
            const rightWall = Bodies.rectangle(WIDTH + 50, HEIGHT/2, 100, HEIGHT, { isStatic: true });
            Composite.add(engine.world, [ground, leftWall, rightWall]);

            // 実行
            runner = Runner.create();
            Runner.run(runner, engine);
            Render.run(render);

            // 初期ぷに
            for (let i = 0; i < 40; i++) {
                spawnPuni();
            }

            // イベント登録
            setupInput();
            
            // タイマー
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert('Game Over! Score: ' + score);
                    location.reload();
                }
            }, 1000);

            // 描画ループで線を引く
            Events.on(render, 'afterRender', drawLinks);
        }

        function spawnPuni() {
            const type = TYPES[Math.floor(Math.random() * TYPES.length)];
            const x = Math.random() * (WIDTH - 100) + 50;
            const y = -50;
            
            const puni = Bodies.circle(x, y, PUNI_RADIUS, {
                restitution: 0.3,
                friction: 0.05,
                render: {
                    fillStyle: type.color
                }
            });
            
            puni.puniType = type.id;
            puni.emoji = type.emoji;
            Composite.add(engine.world, puni);
            punis.push(puni);
        }

        function setupInput() {
            const canvas = render.canvas;

            const handleStart = (e) => {
                isDragging = true;
                selectedPunis = [];
                handleMove(e);
            };

            const handleMove = (e) => {
                if (!isDragging) return;
                
                const pos = getMousePos(e);
                const puni = findPuniAt(pos);

                if (puni) {
                    if (selectedPunis.length === 0) {
                        selectedPunis.push(puni);
                    } else {
                        const last = selectedPunis[selectedPunis.length - 1];
                        // 同じタイプかつ、まだ選択されておらず、距離が近い
                        if (puni.puniType === last.puniType && 
                            !selectedPunis.includes(puni) &&
                            Vector.magnitude(Vector.sub(puni.position, last.position)) < PUNI_RADIUS * 3) {
                            selectedPunis.push(puni);
                        }
                    }
                }
            };

            const handleEnd = () => {
                if (selectedPunis.length >= 3) {
                    clearPunis(selectedPunis);
                }
                selectedPunis = [];
                isDragging = false;
            };

            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);

            canvas.addEventListener('touchstart', (e) => handleStart(e.touches[0]));
            canvas.addEventListener('touchmove', (e) => handleMove(e.touches[0]));
            window.addEventListener('touchend', handleEnd);
        }

        function getMousePos(e) {
            const rect = render.canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function findPuniAt(pos) {
            return punis.find(p => Vector.magnitude(Vector.sub(p.position, pos)) < PUNI_RADIUS);
        }

        function clearPunis(list) {
            const count = list.length;
            score += count * 100 * (count - 2);
            document.getElementById('score').innerText = score;

            list.forEach(puni => {
                Composite.remove(engine.world, puni);
                punis = punis.filter(p => p !== puni);
                spawnPuni(); // 新しいのを補充
            });
        }

        function drawLinks() {
            const ctx = render.context;
            
            // 選択中のぷにを繋ぐ線
            if (selectedPunis.length > 0) {
                ctx.beginPath();
                ctx.lineWidth = 10;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                selectedPunis.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.position.x, p.position.y);
                    else ctx.lineTo(p.position.x, p.position.y);
                });
                ctx.stroke();

                // 絵文字の描画（Matter.jsのデフォルトレンダラを拡張）
                selectedPunis.forEach(p => {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'white';
                    ctx.stroke();
                });
                ctx.shadowBlur = 0;
            }

            // 全てのぷにに絵文字を描画
            ctx.font = `${PUNI_RADIUS * 1.2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            punis.forEach(p => {
                ctx.save();
                ctx.translate(p.position.x, p.position.y);
                ctx.rotate(p.angle);
                ctx.fillText(p.emoji, 0, 0);
                ctx.restore();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
