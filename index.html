<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puni Puni Style Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg-color: #fce4ec;
            --panel-color: #ffffff;
            --accent-color: #ff4081;
            --shuffle-color: #4caf50;
            --combo-color: #ff9800;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 75vh;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 10px;
            border-radius: 20px;
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            min-width: 60px;
        }

        .label { font-size: 10px; color: #888; display: block; text-align: center; }
        .value { font-size: 18px; font-weight: bold; color: var(--accent-color); text-align: center; }

        #combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
            color: var(--combo-color);
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 5px 15px rgba(0,0,0,0.2);
            pointer-events: none;
            opacity: 0;
            z-index: 20;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .combo-anim {
            animation: combo-pop 0.5s forwards;
        }

        @keyframes combo-pop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }

        #controls {
            width: 100%;
            max-width: 400px;
            height: 20vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-shuffle {
            background: var(--shuffle-color);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #388e3c;
            transition: all 0.1s;
        }

        .btn-shuffle:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #388e3c;
        }

        .hint {
            color: #888;
            font-size: 12px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-item">
            <span class="label">SCORE</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="stat-item">
            <span class="label">TIME</span>
            <span id="time" class="value">60</span>
        </div>
    </div>

    <div id="game-container">
        <div id="combo-display">0 COMBO</div>
    </div>

    <div id="controls">
        <button class="btn-shuffle" onclick="shufflePunis()">SHUFFLE</button>
        <div class="hint">素早く消してコンボを繋げよう！</div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Vector, Body } = Matter;

        const WIDTH = 400;
        const HEIGHT = window.innerHeight * 0.75;
        const PUNI_RADIUS = 25;
        const COMBO_TIME_LIMIT = 2000; // 2秒以内に次を消せばコンボ
        const TYPES = [
            { color: '#FF5252', emoji: '🍎', id: 0 },
            { color: '#FFEB3B', emoji: '🍋', id: 1 },
            { color: '#4CAF50', emoji: '🍏', id: 2 },
            { color: '#9C27B0', emoji: '🍇', id: 3 },
            { color: '#FF9800', emoji: '🍊', id: 4 }
        ];

        let engine, render, runner;
        let punis = [];
        let selectedPunis = [];
        let score = 0;
        let timeLeft = 60;
        let isDragging = false;
        
        let comboCount = 0;
        let lastClearTime = 0;
        let comboTimeout;

        function init() {
            engine = Engine.create();
            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: WIDTH,
                    height: HEIGHT,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            const ground = Bodies.rectangle(WIDTH/2, HEIGHT + 50, WIDTH, 100, { isStatic: true });
            const leftWall = Bodies.rectangle(-50, HEIGHT/2, 100, HEIGHT, { isStatic: true });
            const rightWall = Bodies.rectangle(WIDTH + 50, HEIGHT/2, 100, HEIGHT, { isStatic: true });
            Composite.add(engine.world, [ground, leftWall, rightWall]);

            runner = Runner.create();
            Runner.run(runner, engine);
            Render.run(render);

            for (let i = 0; i < 45; i++) {
                spawnPuni(true);
            }

            setupInput();
            
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert('Game Over! Score: ' + score);
                    location.reload();
                }
            }, 1000);

            Events.on(render, 'afterRender', drawLinks);
        }

        function spawnPuni(initial = false) {
            const type = TYPES[Math.floor(Math.random() * TYPES.length)];
            const x = Math.random() * (WIDTH - 60) + 30;
            const y = initial ? Math.random() * (HEIGHT - 200) : -50;
            
            const puni = Bodies.circle(x, y, PUNI_RADIUS, {
                restitution: 0.4,
                friction: 0.05,
                render: { fillStyle: type.color }
            });
            
            puni.puniType = type.id;
            puni.emoji = type.emoji;
            Composite.add(engine.world, puni);
            punis.push(puni);
        }

        function shufflePunis() {
            punis.forEach(puni => {
                const forceMagnitude = 0.03 * puni.mass;
                const angle = Math.random() * Math.PI * 2;
                Body.applyForce(puni, puni.position, {
                    x: Math.cos(angle) * forceMagnitude,
                    y: -Math.abs(Math.sin(angle) * forceMagnitude * 2) - 0.02
                });
            });
            resetCombo(); // シャッフルするとコンボは途切れる
        }

        function setupInput() {
            const canvas = render.canvas;

            const handleStart = (e) => {
                isDragging = true;
                selectedPunis = [];
                handleMove(e);
            };

            const handleMove = (e) => {
                if (!isDragging) return;
                const pos = getMousePos(e);
                const puni = findPuniAt(pos);

                if (puni) {
                    if (selectedPunis.length === 0) {
                        selectedPunis.push(puni);
                    } else {
                        const last = selectedPunis[selectedPunis.length - 1];
                        if (puni.puniType === last.puniType && 
                            !selectedPunis.includes(puni) &&
                            Vector.magnitude(Vector.sub(puni.position, last.position)) < PUNI_RADIUS * 3) {
                            selectedPunis.push(puni);
                        }
                    }
                }
            };

            const handleEnd = () => {
                if (selectedPunis.length >= 3) {
                    clearPunis(selectedPunis);
                }
                selectedPunis = [];
                isDragging = false;
            };

            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleStart(e.touches[0]);
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                handleMove(e.touches[0]);
            }, { passive: false });
            window.addEventListener('touchend', handleEnd);
        }

        function getMousePos(e) {
            const rect = render.canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function findPuniAt(pos) {
            return punis.find(p => Vector.magnitude(Vector.sub(p.position, pos)) < PUNI_RADIUS);
        }

        function clearPunis(list) {
            const now = Date.now();
            
            // コンボ判定
            if (now - lastClearTime < COMBO_TIME_LIMIT) {
                comboCount++;
            } else {
                comboCount = 1;
            }
            lastClearTime = now;

            // コンボ表示の更新
            const comboDisplay = document.getElementById('combo-display');
            if (comboCount > 1) {
                comboDisplay.innerText = `${comboCount} COMBO!`;
                comboDisplay.classList.remove('combo-anim');
                void comboDisplay.offsetWidth; // reflow
                comboDisplay.classList.add('combo-anim');
            }

            // タイマーリセット
            clearTimeout(comboTimeout);
            comboTimeout = setTimeout(resetCombo, COMBO_TIME_LIMIT);

            // スコア計算 (コンボ倍率適用)
            const count = list.length;
            const baseScore = count * 100 * (count - 2);
            const comboBonus = 1 + (comboCount - 1) * 0.1; // 1コンボごとに10%アップ
            score += Math.floor(baseScore * comboBonus);
            document.getElementById('score').innerText = score;

            list.forEach(puni => {
                Composite.remove(engine.world, puni);
                punis = punis.filter(p => p !== puni);
                spawnPuni();
            });
        }

        function resetCombo() {
            comboCount = 0;
            const comboDisplay = document.getElementById('combo-display');
            comboDisplay.classList.remove('combo-anim');
        }

        function drawLinks() {
            const ctx = render.context;
            if (selectedPunis.length > 0) {
                ctx.beginPath();
                ctx.lineWidth = 12;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                selectedPunis.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.position.x, p.position.y);
                    else ctx.lineTo(p.position.x, p.position.y);
                });
                ctx.stroke();
            }

            ctx.font = `${PUNI_RADIUS * 1.2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            punis.forEach(p => {
                ctx.save();
                ctx.translate(p.position.x, p.position.y);
                ctx.rotate(p.angle);
                ctx.fillText(p.emoji, 0, 0);
                ctx.restore();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
