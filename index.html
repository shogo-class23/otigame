<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フルーツパズル・コレクション</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --accent-1: #ff4081;
            --accent-2: #2196f3;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh;
        }

        .title {
            font-size: 42px; font-weight: 900; color: #ff4081;
            text-shadow: 4px 4px 0 #fff; margin-bottom: 50px;
            text-align: center;
        }

        .menu-container {
            display: flex; flex-direction: column; gap: 20px;
            width: 90%; max-width: 350px;
        }

        .game-card {
            background: white; padding: 25px; border-radius: 20px;
            text-decoration: none; display: flex; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 3px solid transparent;
        }

        .game-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .game-card.puni { border-color: var(--accent-1); }
        .game-card.sort { border-color: var(--accent-2); }

        .icon { font-size: 40px; margin-right: 20px; }
        .info { display: flex; flex-direction: column; }
        .game-name { font-size: 20px; font-weight: bold; color: #333; }
        .game-desc { font-size: 12px; color: #888; margin-top: 5px; }

        .footer { position: absolute; bottom: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div class="title">FRUIT<br>GAMES</div>

    <div class="menu-container">
        <!-- ゲーム1: ぷにぷにパズル -->
        <a href="puzzle.html" class="game-card puni">
            <div class="icon">🍎</div>
            <div class="info">
                <span class="game-name">なぞり消しパズル</span>
                <span class="game-desc">同じフルーツをなぞって繋げて消そう！</span>
            </div>
        </a>

        <!-- ゲーム2: ソートパズル -->
        <a href="sort.html" class="game-card sort">
            <div class="icon">🧺</div>
            <div class="info">
                <span class="game-name">仕分けソートパズル</span>
                <span class="game-desc">フルーツを整理してカゴをいっぱいに！</span>
            </div>
        </a>
    </div>

    <div class="footer">Created for shogo-class23</div>

</body>
</html>
