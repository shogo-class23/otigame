<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フルーツ仕分けパズル</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --basket-bg: #ffffff;
            --accent-color: #ff4081;
            --select-color: #4caf50;
            --ad-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; touch-action: manipulation;
        }

        #ui-header {
            width: 100%; max-width: 500px;
            padding: 15px; display: flex; justify-content: space-between;
            box-sizing: border-box; flex-wrap: wrap; gap: 10px;
        }

        .stat-box {
            background: white; padding: 8px 15px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;
            flex: 1; min-width: 80px;
        }

        .label { font-size: 10px; color: #888; display: block; }
        .value { font-size: 18px; font-weight: bold; color: var(--accent-color); }

        #game-area {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 15px; padding: 20px; max-width: 500px;
        }

        .basket {
            width: 65px; height: 170px;
            background: var(--basket-bg);
            border: 3px solid #ddd; border-radius: 0 0 35px 35px;
            display: flex; flex-direction: column-reverse; align-items: center;
            padding-bottom: 10px; cursor: pointer; transition: all 0.2s;
            position: relative; box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .basket.selected { border-color: var(--select-color); background: #f1f8e9; }
        .basket.completed { border-color: #ffd700; background: #fffdf0; cursor: default; }

        .fruit {
            width: 45px; height: 35px; font-size: 30px;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s ease;
        }

        .selected-fruit {
            transform: translateY(-110px);
            animation: bounce 0.5s infinite alternate;
            z-index: 10;
        }

        @keyframes bounce {
            from { transform: translateY(-110px); }
            to { transform: translateY(-125px); }
        }

        .btn-action {
            background: #fff; border: 2px solid var(--accent-color); color: var(--accent-color);
            padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-action:hover { background: var(--accent-color); color: white; }
        .btn-action:disabled { border-color: #ccc; color: #ccc; cursor: default; }

        /* 広告オーバーレイ */
        #ad-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ad-bg); z-index: 3000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        #ad-timer { font-size: 80px; font-weight: bold; margin: 20px; }
        #ad-close {
            position: absolute; top: 20px; right: 20px;
            font-size: 30px; color: white; cursor: pointer;
            display: none; border: 2px solid white; width: 40px; height: 40px;
            border-radius: 50%; justify-content: center; align-items: center;
        }

        #home-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .title { font-size: 40px; font-weight: bold; color: var(--accent-color); text-align: center; margin-bottom: 40px; }
        .btn-start {
            background: var(--accent-color); color: white; border: none;
            padding: 15px 50px; border-radius: 30px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 0 #d81b60;
        }

        #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .completed-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #ffd700; font-size: 12px; opacity: 0;
        }

        .flash { animation: flash-anim 1s forwards; }
        @keyframes flash-anim {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        .nav-links { margin-top: 30px; }
        .nav-links a { color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="title">フルーツ<br>ソートパズル</div>
        <button class="btn-start" onclick="startGame()">START</button>
        <div class="nav-links">
            <a href="index.html">← ゲーム選択に戻る</a>
        </div>
    </div>

    <div id="ui-header">
        <div class="stat-box">
            <span class="label">SCORE</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="stat-box">
            <span class="label">TIME</span>
            <span id="time" class="value">60</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <button id="undo-btn" class="btn-action" onclick="undo()" disabled>↩ 1手戻る</button>
            <button class="btn-action" onclick="showAd()">➕ カゴ追加</button>
        </div>
    </div>

    <div id="game-area"></div>

    <div id="ad-overlay">
        <div id="ad-close" onclick="closeAd()">×</div>
        <div style="font-size: 14px; color: #aaa;">SPONSORED AD</div>
        <div id="ad-timer">5</div>
        <div style="font-size: 18px;">視聴後にカゴが追加されます...</div>
    </div>

    <div id="result-screen">
        <h1 id="result-title" style="color: var(--accent-color); font-size: 40px;">FINISH!</h1>
        <div class="label">FINAL SCORE</div>
        <div id="final-score" class="value" style="font-size: 60px; margin: 20px 0;">0</div>
        <button class="btn-start" onclick="location.reload()">RETRY</button>
        <div class="nav-links">
            <a href="index.html">← ゲーム選択に戻る</a>
        </div>
    </div>

    <script>
        const FRUITS = ['🍎', '🍋', '🍇', '🍊', '🍑'];
        const INITIAL_BASKET_COUNT = 7;
        const CAPACITY = 4;
        
        let baskets = [];
        let history = [];
        let score = 0;
        let timeLeft = 60;
        let selectedIndex = null;
        let isGameActive = false;
        let gameTimerInterval;

        function startGame() {
            document.getElementById('home-screen').style.display = 'none';
            isGameActive = true;
            initBaskets();
            startTimer();
            render();
        }

        function initBaskets() {
            let allFruits = [];
            FRUITS.forEach(f => {
                for(let i=0; i<CAPACITY; i++) allFruits.push(f);
            });

            for (let i = allFruits.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allFruits[i], allFruits[j]] = [allFruits[j], allFruits[i]];
            }

            baskets = [];
            for (let i = 0; i < INITIAL_BASKET_COUNT; i++) {
                if (i < FRUITS.length) {
                    baskets.push(allFruits.slice(i * CAPACITY, (i + 1) * CAPACITY));
                } else {
                    baskets.push([]);
                }
            }
            history = [];
        }

        function startTimer() {
            if (gameTimerInterval) clearInterval(gameTimerInterval);
            gameTimerInterval = setInterval(() => {
                if (!isGameActive) return;
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameTimerInterval);
                    endGame('TIME UP!');
                }
            }, 1000);
        }

        function render() {
            const area = document.getElementById('game-area');
            area.innerHTML = '';

            baskets.forEach((content, i) => {
                const basketDiv = document.createElement('div');
                const completed = isCompleted(i);
                basketDiv.className = `basket ${selectedIndex === i ? 'selected' : ''} ${completed ? 'completed' : ''}`;
                
                basketDiv.onclick = () => handleBasketClick(i);

                const topFruit = content[content.length - 1];
                let identicalCount = 0;
                if (selectedIndex === i) {
                    for (let j = content.length - 1; j >= 0; j--) {
                        if (content[j] === topFruit) identicalCount++;
                        else break;
                    }
                }

                content.forEach((fruit, fi) => {
                    const fruitDiv = document.createElement('div');
                    fruitDiv.className = 'fruit';
                    fruitDiv.innerText = fruit;
                    if (selectedIndex === i && fi >= content.length - identicalCount) {
                        fruitDiv.classList.add('selected-fruit');
                    }
                    basketDiv.appendChild(fruitDiv);
                });

                const effect = document.createElement('div');
                effect.className = 'completed-effect';
                effect.id = `effect-${i}`;
                effect.innerText = '✨COMPLETE✨';
                basketDiv.appendChild(effect);

                area.appendChild(basketDiv);
            });

            document.getElementById('score').innerText = score;
            document.getElementById('undo-btn').disabled = history.length === 0;
        }

        function handleBasketClick(i) {
            if (!isGameActive) return;

            if (selectedIndex === null) {
                if (baskets[i].length > 0 && !isCompleted(i)) {
                    selectedIndex = i;
                }
            } else {
                if (selectedIndex === i) {
                    selectedIndex = null;
                } else {
                    if (canMove(selectedIndex, i)) {
                        saveHistory(); // 移動前に履歴を保存
                        executeMove(selectedIndex, i);
                        selectedIndex = null;
                    } else {
                        if (baskets[i].length > 0 && !isCompleted(i)) {
                            selectedIndex = i;
                        } else {
                            selectedIndex = null;
                        }
                    }
                }
            }
            render();
        }

        function canMove(from, to) {
            const target = baskets[to];
            if (target.length >= CAPACITY) return false;
            if (isCompleted(to)) return false;
            return true;
        }

        function executeMove(from, to) {
            const source = baskets[from];
            const target = baskets[to];
            const fruitToMove = source[source.length - 1];

            while (source.length > 0 && source[source.length - 1] === fruitToMove && target.length < CAPACITY) {
                target.push(source.pop());
                score += 10;
            }

            if (isCompleted(to)) {
                score += 500;
                showCompleteEffect(to);
                checkAllCompleted();
            }
        }

        function saveHistory() {
            // 深いコピーで現在の状態を保存
            history.push({
                baskets: baskets.map(b => [...b]),
                score: score
            });
            if (history.length > 20) history.shift(); // 最大20手まで保存
        }

        function undo() {
            if (history.length === 0 || !isGameActive) return;
            const lastState = history.pop();
            baskets = lastState.baskets;
            score = lastState.score;
            selectedIndex = null;
            render();
        }

        // 広告風演出
        function showAd() {
            if (!isGameActive) return;
            const overlay = document.getElementById('ad-overlay');
            const timerEl = document.getElementById('ad-timer');
            const closeBtn = document.getElementById('ad-close');
            
            overlay.style.display = 'flex';
            closeBtn.style.display = 'none';
            
            let count = 5;
            timerEl.innerText = count;
            
            const adInterval = setInterval(() => {
                count--;
                timerEl.innerText = count;
                if (count <= 0) {
                    clearInterval(adInterval);
                    timerEl.innerText = 'REWARD READY!';
                    closeBtn.style.display = 'flex';
                }
            }, 1000);
        }

        function closeAd() {
            document.getElementById('ad-overlay').style.display = 'none';
            // カゴを追加
            baskets.push([]);
            render();
        }

        function isCompleted(i) {
            const b = baskets[i];
            return b.length === CAPACITY && b.every(f => f === b[0]);
        }

        function checkAllCompleted() {
            const completedCount = baskets.filter((_, i) => isCompleted(i)).length;
            if (completedCount === FRUITS.length) {
                isGameActive = false;
                clearInterval(gameTimerInterval);
                setTimeout(() => endGame('GAME CLEAR!'), 500);
            }
        }

        function showCompleteEffect(i) {
            const el = document.getElementById(`effect-${i}`);
            if (el) {
                el.classList.remove('flash');
                void el.offsetWidth;
                el.classList.add('flash');
            }
        }

        function endGame(title) {
            isGameActive = false;
            document.getElementById('result-title').innerText = title;
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
